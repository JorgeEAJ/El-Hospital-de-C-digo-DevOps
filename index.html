<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hospital DevOps: Triaje de Emergencia</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #1a1a1a; color: #00ff00; text-align: center; padding: 50px; }
        .monitor { border: 5px solid #333; background: #000; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 0 20px #00ff00; }
        input { background: #222; border: 1px solid #00ff00; color: #00ff00; padding: 10px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; cursor: pointer; font-weight: bold; border: none; margin: 5px; }
        .btn-rojo { background: #ff0000; color: white; }
        .btn-verde { background: #00ff00; color: black; }
        #pantalla { margin-top: 20px; min-height: 40px; border-top: 1px solid #333; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="monitor">
        <h1>🏥 SISTEMA DEVOPS</h1>
        <p>NOMBRE DEL PACIENTE:</p>
        <input type="text" id="paciente" placeholder="Escribe nombre...">
        <br>
        <button class="btn btn-rojo" onclick="clasificarPaciente('critico')">CRÍTICO</button>
        <button class="btn btn-verde" onclick="clasificarPaciente('estable')">ESTABLE</button>
        <div id="pantalla">Esperando ingreso...</div>
    </div>
    <script src="index.js"></script>
</body>
</html>
